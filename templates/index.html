<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>广东天气中枢</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="bg-noise"></div>

    <main class="container">
      <section id="overview" class="flow-section overview-panel">
        <header class="topbar glass reveal" style="--delay: 0ms">
          <div>
            <p class="eyebrow">Guangdong Weather</p>
            <h1>广东天气中枢</h1>
          </div>
          <div id="nowTime" class="mono"></div>
        </header>

        <div class="grid-two">
          <article class="weather-main glass reveal" style="--delay: 80ms">
            <div class="city-row">
              <h2 id="cityName">广州</h2>
              <div id="cityPicker" class="city-picker">
                <select id="citySelect" class="native-city-select" aria-hidden="true" tabindex="-1"></select>
                <button
                  id="cityPickerTrigger"
                  class="city-picker-trigger"
                  type="button"
                  aria-haspopup="listbox"
                  aria-expanded="false"
                  aria-controls="cityPickerList"
                >
                  <span id="cityPickerValue">广州</span>
                  <span class="city-picker-icon" aria-hidden="true"></span>
                </button>
                <div id="cityPickerPanel" class="city-picker-panel">
                  <input id="citySearch" class="city-search" type="search" placeholder="搜索城市" autocomplete="off" />
                  <div id="cityPickerList" class="city-picker-list" role="listbox" aria-label="城市"></div>
                </div>
              </div>
            </div>
            <div class="temp-wrap">
              <span id="tempHigh" class="temp-big">--</span>
              <span class="unit">°C</span>
            </div>
            <p class="secondary">最高温 / 最低温：<span id="tempLow">--</span>°C</p>
          </article>

          <article class="metrics glass reveal" style="--delay: 160ms">
            <h3>AQI & 指标</h3>
            <div class="matrix">
              <div><label>AQI</label><strong id="metricAqi">--</strong></div>
              <div><label>湿度</label><strong id="metricHumidity">--</strong></div>
              <div><label>风速</label><strong id="metricWindSpeed">--</strong></div>
              <div><label>紫外线</label><strong id="metricUvIndex">--</strong></div>
              <div><label>能见度</label><strong id="metricVisibility">--</strong></div>
              <div><label>气压</label><strong id="metricPressure">--</strong></div>
            </div>
          </article>
        </div>
      </section>

      <section id="historyPanel" class="flow-section">
        <article class="glass reveal panel-fill" style="--delay: 120ms">
          <div class="section-heading">
            <p class="eyebrow">Trend</p>
            <h3>近 14 天温度记录</h3>
          </div>
          <div id="history" class="history"></div>
        </article>
      </section>

      <section id="cityPanel" class="flow-section">
        <article class="glass reveal panel-fill" style="--delay: 160ms">
          <div class="row-between">
            <div class="section-heading">
              <p class="eyebrow">Cities</p>
              <h3>全广东最新温度</h3>
            </div>
            <button id="refreshBtn">立即爬取</button>
          </div>
          <div id="cityCards" class="city-cards"></div>
        </article>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
