<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>广东天气中枢</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="bg-noise"></div>
    <main class="container">
      <header class="topbar glass reveal" style="--delay: 0ms">
        <h1>广东天气中枢</h1>
        <div id="nowTime" class="mono"></div>
      </header>

      <section class="grid-two">
        <article class="weather-main glass reveal" style="--delay: 80ms">
          <div class="city-row">
            <h2 id="cityName">广州</h2>
            <select id="citySelect"></select>
          </div>
          <div class="temp-wrap">
            <span id="tempHigh" class="temp-big">--</span>
            <span class="unit">°C</span>
          </div>
          <p class="secondary">最高温 / 最低温：<span id="tempLow">--</span>°C</p>
        </article>

        <article class="metrics glass reveal" style="--delay: 160ms">
          <h3>AQI & 指标（占位）</h3>
          <div class="matrix">
            <div><label>AQI</label><strong>--</strong></div>
            <div><label>湿度</label><strong>--</strong></div>
            <div><label>风速</label><strong>--</strong></div>
            <div><label>紫外线</label><strong>--</strong></div>
            <div><label>能见度</label><strong>--</strong></div>
            <div><label>气压</label><strong>--</strong></div>
          </div>
        </article>
      </section>

      <section class="glass reveal" style="--delay: 240ms">
        <h3>近 14 天温度记录</h3>
        <div id="history" class="history"></div>
      </section>

      <section class="glass reveal" style="--delay: 320ms">
        <div class="row-between">
          <h3>全广东最新温度</h3>
          <button id="refreshBtn">立即爬取</button>
        </div>
        <div id="cityCards" class="city-cards"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
